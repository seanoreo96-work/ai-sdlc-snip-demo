name: Build and push Docker image

# Fires on a push to main that touches:
#   - `bundle`  — the gitlink (submodule pointer) for the generated bundle branch;
#                 this path changes each time build-bundle.mjs commits a new release.
#   - this workflow file itself.
# Also supports manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - bundle                           # submodule pointer — new bundle release pinned
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write                        # push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with bundle submodule content)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./bundle
          file: ./bundle/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
